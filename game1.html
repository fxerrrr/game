<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200, height=800, user-scalable=no" />
<title>记忆翻翻乐 - 主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "微软雅黑", "幼圆", sans-serif;
  user-select: none;
}
body {
  width: 1200px;
  height: 800px;
  overflow: hidden;
}

/* 主页样式 */
#homePage {
  width: 1200px;
  height: 800px;
  background: linear-gradient(135deg, #87CEFA, #BBE1FA);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 60px;
}
.home-title {
  font-size: 72px;
  color: #1E3A8A;
  text-shadow: 4px 4px 8px rgba(0,0,0,0.15);
  letter-spacing: 8px;
}
.home-desc {
  font-size: 32px;
  color: #2c5282;
}
.start-btn {
  padding: 20px 60px;
  font-size: 36px;
  border: none;
  border-radius: 50px;
  background: #3B82F6;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(59,130,246,0.4);
  transition: all 0.3s ease;
}
.start-btn:hover {
  background: #2563EB;
  transform: translateY(-5px);
  box-shadow: 0 12px 28px rgba(59,130,246,0.5);
}

/* 游戏页面 默认隐藏 */
#gamePage {
  display: none;
  width: 1200px;
  height: 800px;
}

/* 原有游戏样式 */
#header {
  width: 1200px;
  height: 100px;
  background: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
  font-size: 28px;
  color: #2266cc;
  font-weight: bold;
  box-shadow: 0 2px 8px #0002;
  position: relative;
}
#restartBtn {
  position: absolute;
  right: 30px;
  padding: 8px 20px;
  font-size: 20px;
  border: none;
  border-radius: 8px;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
}
#restartBtn:hover {
  background: #ee5253;
}
#gameBoard {
  width: 1200px;
  height: 700px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #e0f7ff, #cce5ff);
  animation: bgMove 15s ease infinite alternate;
}
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
#cardWrap {
  display: grid;
  gap: 15px;
}
.card {
  width: 120px;
  height: 120px;
  background: #2266cc;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  color: transparent;
  transition: all 0.4s ease;
  transform-style: preserve-3d;
}
.card.open {
  background: #ffffff;
  color: #000;
  transform: rotateY(180deg);
}
.card.match {
  background: #90ee90;
  pointer-events: none;
  animation: matchBounce 0.6s ease;
}
@keyframes matchBounce {
  0% { transform: scale(1) rotateY(180deg); }
  50% { transform: scale(1.15) rotateY(180deg); }
  100% { transform: scale(1) rotateY(180deg); }
}
.modal {
  position: absolute;
  top: 0;
  left: 0;
  width: 1200px;
  height: 800px;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
.modal.show {
  opacity: 1;
  visibility: visible;
}
.modalBox {
  background: #fff;
  padding: 50px 80px;
  border-radius: 20px;
  text-align: center;
  transform: scale(0.8);
  transition: all 0.3s ease;
}
.modal.show .modalBox {
  transform: scale(1);
}
.modalBox h2 {
  font-size: 36px;
  color: #2266cc;
  margin-bottom: 20px;
}
.modalBox p {
  font-size: 24px;
  color: #555;
  line-height: 1.8;
  margin-bottom: 30px;
}
.modalBtn {
  padding: 12px 35px;
  font-size: 24px;
  border: none;
  border-radius: 10px;
  background: #2266cc;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s ease;
  margin: 0 10px;
}
.modalBtn:hover {
  background: #1a52aa;
  transform: translateY(-2px);
}
</style>
</head>
<body>

<!-- 精美主页 -->
<div id="homePage">
  <h1 class="home-title">记忆翻翻乐</h1>
  <p class="home-desc">找出相同图案，开启脑力闯关</p>
  <button class="start-btn" id="enterGameBtn">开始闯关</button>
</div>

<!-- 游戏页面 -->
<div id="gamePage">
  <!-- 开局说明弹窗 -->
  <div id="startModal" class="modal show">
    <div class="modalBox">
      <h2>🎮 游戏规则 🎮</h2>
      <p>1. 点击卡牌翻开图案<br>
         2. 找出两张一模一样的图案配对<br>
         3. 全部配对成功即可进入下一关<br>
         4. 右上角可随时重新开始，返回第一关
      </p>
      <button class="modalBtn" id="startGameBtn">开始游戏</button>
    </div>
  </div>

  <!-- 通关弹窗 -->
  <div id="winModal" class="modal">
    <div class="modalBox">
      <h2>🎉 恭喜过关 🎉</h2>
      <button class="modalBtn" id="nextLevelBtn">下一关</button>
    </div>
  </div>

  <div id="header">
    <span>关卡：<span id="levelNum">1</span>/5</span>
    <span>时间：<span id="timeNum">90</span>秒</span>
    <span>配对：<span id="matchNum">0</span></span>
    <button id="restartBtn">重新开始</button>
  </div>

  <div id="gameBoard">
    <div id="cardWrap"></div>
  </div>
</div>

<script>
// 页面切换
const homePage = document.getElementById("homePage");
const gamePage = document.getElementById("gamePage");
const enterGameBtn = document.getElementById("enterGameBtn");

// 点击主页按钮进入游戏
enterGameBtn.addEventListener("click", () => {
  homePage.style.display = "none";
  gamePage.style.display = "block";
});

// 关卡配置
const levelConfig = [
  { rows: 2, cols: 2, time: 90, icons: ["🍎", "🍐", "🍊", "🍋"] },
  { rows: 2, cols: 3, time: 120, icons: ["🐱", "🐶", "🐰", "🐻", "🐼", "🐨"] },
  { rows: 3, cols: 4, time: 150, icons: ["🌸", "🌼", "🌺", "🌻", "🌹", "🌷", "🌵", "🌴", "🌿", "🍀", "🌱", "🪴"] },
  { rows: 4, cols: 4, time: 180, icons: ["🍕", "🍔", "🍟", "🌭", "🍿", "🍩", "🍪", "🎂", "🍰", "🍦", "🍨", "🍧", "🍫", "🍬", "🍭", "🍯"] },
  { rows: 4, cols: 5, time: 210, icons: ["🚗", "🚕", "🚙", "🚌", "🚎", "🏎️", "🚓", "🚑", "🚒", "🚐", "🛳️", "✈️", "🚀", "🚁", "🛸", "🚂", "🚃", "🚄", "🚅", "🚆"] }
];

let nowLevel = 1, rows = 2, cols = 2, totalTime = 90, timeLeft = 90;
let timer = null, openCards = [], matchCount = 0, totalMatch = 0;

const cardWrap = document.getElementById("cardWrap");
const levelNum = document.getElementById("levelNum");
const timeNum = document.getElementById("timeNum");
const matchNum = document.getElementById("matchNum");
const startModal = document.getElementById("startModal");
const winModal = document.getElementById("winModal");
const startGameBtn = document.getElementById("startGameBtn");
const nextLevelBtn = document.getElementById("nextLevelBtn");
const restartBtn = document.getElementById("restartBtn");

// 统一重置到第一关
function resetToFirstLevel() {
  nowLevel = 1;
  initLevel();
}

// 开始游戏
startGameBtn.addEventListener("click",()=>{
  startModal.classList.remove("show");
  resetToFirstLevel();
});

// 右上角重新开始
restartBtn.addEventListener("click", () => {
  resetToFirstLevel();
});

// 通关按钮
nextLevelBtn.addEventListener("click", () => {
  if (nowLevel < 5) {
    nowLevel++;
    initLevel();
  } else {
    resetToFirstLevel();
  }
});

function initLevel() {
  openCards = [];
  matchCount = 0;
  winModal.classList.remove("show");

  let cfg = levelConfig[nowLevel - 1];
  rows = cfg.rows;
  cols = cfg.cols;
  totalTime = cfg.time;
  timeLeft = totalTime;

  levelNum.innerText = nowLevel;
  timeNum.innerText = timeLeft;
  matchNum.innerText = matchCount;

  cardWrap.style.gridTemplateRows = `repeat(${rows},120px)`;
  cardWrap.style.gridTemplateColumns = `repeat(${cols},120px)`;

  let icons = cfg.icons;
  totalMatch = icons.length / 2;
  let cards = [];
  for (let i = 0; i < totalMatch; i++) {
    cards.push(icons[i], icons[i]);
  }
  cards.sort(() => Math.random() - 0.5);

  cardWrap.innerHTML = "";
  cards.forEach(icon => {
    let card = document.createElement("div");
    card.className = "card";
    card.dataset.icon = icon;
    card.addEventListener("click", flipCard);
    cardWrap.appendChild(card);
  });

  startTimer();
}

function flipCard(e) {
  let card = e.target;
  if (card.classList.contains("open") || card.classList.contains("match") || openCards.length >= 2) return;

  card.classList.add("open");
  card.innerText = card.dataset.icon;
  openCards.push(card);
  if (openCards.length === 2) checkMatch();
}

function checkMatch() {
  let c1 = openCards[0], c2 = openCards[1];
  if (c1.dataset.icon === c2.dataset.icon) {
    c1.classList.add("match");
    c2.classList.add("match");
    matchCount++;
    matchNum.innerText = matchCount;
    openCards = [];
    if (matchCount === totalMatch) {
      clearInterval(timer);
      setTimeout(() => {
        if (nowLevel === 5) {
          document.querySelector("#winModal .modalBox h2").innerText = "🎉 恭喜完成所有关卡，你真是太棒啦 🎉";
          nextLevelBtn.innerText = "重新开始";
        } else {
          document.querySelector("#winModal .modalBox h2").innerText = "🎉 恭喜过关 🎉";
          nextLevelBtn.innerText = "下一关";
        }
        winModal.classList.add("show");
      }, 400);
    }
  } else {
    setTimeout(() => {
      c1.classList.remove("open"); c1.innerText = "";
      c2.classList.remove("open"); c2.innerText = "";
      openCards = [];
    }, 800);
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    timeNum.innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      alert("时间到，回到第一关重新挑战！");
      resetToFirstLevel();
    }
  }, 1000);
}
</script>

</body>
</html>
