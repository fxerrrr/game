<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200, height=800, user-scalable=no" />
<title>记忆翻翻乐</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "微软雅黑", "幼圆", sans-serif;
  user-select: none;
}
body {
  width: 1200px;
  height: 800px;
  overflow: hidden;
}

/* ---------------- 简约主页 ---------------- */
#homePage {
  width: 1200px;
  height: 800px;
  background: linear-gradient(135deg, #e0f7ff, #cce5ff);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}
.home-title {
  font-size: 60px;
  color: #2266cc;
  font-weight: bold;
}
.home-desc {
  font-size: 26px;
  color: #444;
}
.start-btn {
  padding: 18px 50px;
  font-size: 32px;
  border: none;
  border-radius: 16px;
  background: #2266cc;
  color: #fff;
  cursor: pointer;
  transition: 0.2s;
}
.start-btn:hover {
  background: #1a52aa;
  transform: scale(1.05);
}

/* ---------------- 游戏页面 ---------------- */
#gamePage {
  display: none;
  width: 1200px;
  height: 800px;
}

#header {
  width: 1200px;
  height: 100px;
  background: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
  font-size: 28px;
  color: #2266cc;
  font-weight: bold;
  position: relative;
}
#restartBtn {
  position: absolute;
  right: 30px;
  padding: 8px 20px;
  font-size: 20px;
  border: none;
  border-radius: 8px;
  background: #ff6b6b;
  color: white;
  cursor: pointer;
}
#restartBtn:hover {
  background: #ee5253;
}

/* 游戏区域整体上移（平板友好） */
#gameBoard {
  width: 1200px;
  height: 700px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 30px;
  background: linear-gradient(135deg, #e0f7ff, #cce5ff);
}
#cardWrap {
  display: grid;
  gap: 15px;
  margin-top: 20px;
}

.card {
  width: 120px;
  height: 120px;
  background: #2266cc;
  border-radius: 12px;
  font-size: 48px;
  color: transparent;
  transition: all 0.4s ease;
  transform-style: preserve-3d;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card.open {
  background: #fff;
  color: #000;
  transform: rotateY(180deg);
}
.card.match {
  background: #90ee90;
  pointer-events: none;
  animation: matchBounce 0.6s ease;
}
@keyframes matchBounce {
  0% { transform: scale(1) rotateY(180deg); }
  50% { transform: scale(1.15) rotateY(180deg); }
  100% { transform: scale(1) rotateY(180deg); }
}

/* 弹窗 */
.modal {
  position: absolute;
  top: 0; left: 0;
  width: 1200px; height: 800px;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}
.modal.show {
  opacity: 1;
  visibility: visible;
}
.modalBox {
  background: #fff;
  padding: 40px 60px;
  border-radius: 20px;
  text-align: center;
}
.modalBox h2 {
  font-size: 32px;
  color: #2266cc;
  margin-bottom: 20px;
}
.modalBox p {
  font-size: 22px;
  line-height: 1.6;
  margin-bottom: 25px;
}
.modalBtn {
  padding: 12px 30px;
  font-size: 22px;
  border: none;
  border-radius: 10px;
  background: #2266cc;
  color: #fff;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- 简约主页 -->
<div id="homePage">
  <h1 class="home-title">记忆翻翻乐</h1>
  <p class="home-desc">找出相同图案，快乐闯关</p>
  <button class="start-btn" id="enterGameBtn">开始游戏</button>
</div>

<!-- 游戏页面 -->
<div id="gamePage">
  <div id="startModal" class="modal show">
    <div class="modalBox">
      <h2>游戏规则</h2>
      <p>1. 点击卡牌翻开图案<br>
         2. 找到相同图案配对<br>
         3. 全部配对即可过关<br>
         4. 重新开始会回到第一关</p>
      <button class="modalBtn" id="startGameBtn">开始游戏</button>
    </div>
  </div>

  <div id="winModal" class="modal">
    <div class="modalBox">
      <h2>恭喜过关</h2>
      <button class="modalBtn" id="nextLevelBtn">下一关</button>
    </div>
  </div>

  <div id="header">
    <span>关卡：<span id="levelNum">1</span>/5</span>
    <span>时间：<span id="timeNum">90</span>秒</span>
    <span>配对：<span id="matchNum">0</span></span>
    <button id="restartBtn">重新开始</button>
  </div>

  <div id="gameBoard">
    <div id="cardWrap"></div>
  </div>
</div>

<script>
const homePage = document.getElementById("homePage");
const gamePage = document.getElementById("gamePage");
const enterGameBtn = document.getElementById("enterGameBtn");

enterGameBtn.onclick = function(){
  homePage.style.display = "none";
  gamePage.style.display = "block";
};

const levelConfig = [
  { rows:2, cols:2, time:90, icons:["🍎","🍐","🍊","🍋"] },
  { rows:2, cols:3, time:120, icons:["🐱","🐶","🐰","🐻","🐼","🐨"] },
  { rows:3, cols:4, time:150, icons:["🌸","🌼","🌺","🌻","🌹","🌷","🌵","🌴","🌿","🍀","🌱","🪴"] },
  { rows:4, cols:4, time:180, icons:["🍕","🍔","🍟","🌭","🍿","🍩","🍪","🎂","🍰","🍦","🍨","🍧","🍫","🍬","🍭","🍯"] },
  { rows:4, cols:5, time:210, icons:["🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🚐","🛳️","✈️","🚀","🚁","🛸","🚂","🚃","🚄","🚅","🚆"] }
];

let nowLevel = 1;
let timer = null;
let openCards = [], matchCount = 0, totalMatch = 0;

const cardWrap = document.getElementById("cardWrap");
const levelNum = document.getElementById("levelNum");
const timeNum = document.getElementById("timeNum");
const matchNum = document.getElementById("matchNum");
const startModal = document.getElementById("startModal");
const winModal = document.getElementById("winModal");
const startGameBtn = document.getElementById("startGameBtn");
const nextLevelBtn = document.getElementById("nextLevelBtn");
const restartBtn = document.getElementById("restartBtn");

function resetToFirstLevel(){
  nowLevel = 1;
  initLevel();
}

startGameBtn.onclick = function(){
  startModal.classList.remove("show");
  resetToFirstLevel();
};

restartBtn.onclick = resetToFirstLevel;

nextLevelBtn.onclick = function(){
  if(nowLevel <5) {
    nowLevel++;
    initLevel();
  } else {
    resetToFirstLevel();
  }
};

function initLevel(){
  openCards = [];
  matchCount = 0;
  winModal.classList.remove("show");
  let cfg = levelConfig[nowLevel-1];
  levelNum.innerText = nowLevel;
  timeNum.innerText = cfg.time;
  matchNum.innerText = 0;

  cardWrap.style.gridTemplateRows = `repeat(${cfg.rows},120px)`;
  cardWrap.style.gridTemplateColumns = `repeat(${cfg.cols},120px)`;

  totalMatch = cfg.icons.length/2;
  let cards = [];
  for(let i=0;i<totalMatch;i++){
    cards.push(cfg.icons[i], cfg.icons[i]);
  }
  cards.sort(()=>Math.random()-0.5);

  cardWrap.innerHTML = "";
  cards.forEach(icon=>{
    let d = document.createElement("div");
    d.className = "card";
    d.dataset.icon = icon;
    d.onclick = flipCard;
    cardWrap.appendChild(d);
  });

  clearInterval(timer);
  let t = cfg.time;
  timer = setInterval(()=>{
    t--;
    timeNum.innerText = t;
    if(t<=0){
      clearInterval(timer);
      alert("时间到，返回第一关");
      resetToFirstLevel();
    }
  },1000);
}

function flipCard(e){
  let c = e.target;
  if(c.classList.contains("open")||c.classList.contains("match")||openCards.length>=2) return;
  c.classList.add("open");
  c.innerText = c.dataset.icon;
  openCards.push(c);
  if(openCards.length===2) check();
}

function check(){
  let a = openCards[0], b=openCards[1];
  if(a.dataset.icon === b.dataset.icon){
    a.classList.add("match");
    b.classList.add("match");
    matchCount++;
    matchNum.innerText = matchCount;
    openCards = [];
    if(matchCount === totalMatch){
      clearInterval(timer);
      setTimeout(()=>{
        if(nowLevel===5){
          winModal.querySelector("h2").innerText = "🎉 全部通关，你真棒！";
          nextLevelBtn.innerText = "重新开始";
        } else {
          winModal.querySelector("h2").innerText = "🎉 恭喜过关";
          nextLevelBtn.innerText = "下一关";
        }
        winModal.classList.add("show");
      },400);
    }
  } else {
    setTimeout(()=>{
      a.classList.remove("open"); a.innerText="";
      b.classList.remove("open"); b.innerText="";
      openCards=[];
    },800);
  }
}
</script>
</body>
</html>
