<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迷宫闯关</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f0f2f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
        }
        .game {
            width: 100vw;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .bar {
            height: 50px;
            background: linear-gradient(135deg, #ff6b9d, #ff8e6e);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .canvas-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }
        #canvas {
            display: block;
            background: #fffaf2;
            border-radius: 16px;
            box-shadow: inset 0 0 0 2px rgba(255,240,210,0.9);
            max-height: calc(100vh - 140px);
            max-width: 95%;
            object-fit: contain;
        }
        .ctrl {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff6f9;
            padding: 8px 0;
            border-top: 1px solid #ffe0ed;
            gap: 20px;
            flex-shrink: 0;
        }
        .dpad {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .row {
            display: flex;
            gap: 12px;
        }

        /* ========== 按键再次缩小 ========== */
        .key {
            width: 42px;
            height: 42px;
            background: #ff6b9d;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            color: white;
            font-weight: bold;
            box-shadow: 0 3px 0 #b83e6b;
            cursor: pointer;
            transition: 0.04s linear;
            touch-action: manipulation;
        }
        .attack-key {
            width: 46px;
            height: 46px;
            background: #e74c3c;
            box-shadow: 0 3px 0 #992d22;
            font-size: 22px;
            position: relative;
        }
        .attack-key::after {
            content: attr(data-cooldown);
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #666;
        }
        .key:active, .attack-key:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #666;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 1000;
            width: 280px;
        }
        .modal h2 {
            color: #ff6b9d;
            margin-bottom: 12px;
            font-size: 24px;
        }
        .modal p {
            margin-bottom: 20px;
            color: #444;
            font-size: 14px;
        }
        .btn {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .hide { display: none; }

        .slash-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 80, 80, 0.4);
            pointer-events: none;
            animation: slash 0.25s ease-out forwards;
            z-index: 10;
        }
        @keyframes slash {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .hit-effect {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,99,71,0.8) 0%, rgba(255,99,71,0) 70%);
            z-index: 10;
            pointer-events: none;
            animation: hit 0.5s ease-out forwards;
        }
        @keyframes hit {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
    </style>
</head>

<body>
<div class="game">
    <div class="bar">
        <div>🎈 第 <span id="lv">1</span> 关</div>
        <div>⏱️ <span id="time">50</span>s  👾 <span id="ene">0</span></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
    </div>
    <div class="ctrl">
        <div class="dpad">
            <div class="row"><button class="key" data-dx="0" data-dy="-1">▲</button></div>
            <div class="row">
                <button class="key" data-dx="-1" data-dy="0">◀</button>
                <button class="key" data-dx="0" data-dy="1">▼</button>
                <button class="key" data-dx="1" data-dy="0">▶</button>
            </div>
        </div>
        <button class="key attack-key" id="attackBtn" data-cooldown="">🗡️</button>
    </div>
</div>

<div id="start" class="modal">
    <h2>🎮 迷宫冒险</h2>
    <p>🗡️ 挥剑攻击\n💥 范围秒杀\n✅ 每关都能通关</p>
    <button class="btn" id="startBtn">开始游戏</button>
</div>
<div id="win" class="modal hide">
    <h2>🎉 闯关成功</h2>
    <button class="btn" id="nextBtn">下一关</button>
</div>
<div id="lose" class="modal hide">
    <h2>💀 游戏结束</h2>
    <button class="btn" id="restartBtn">重新开始</button>
</div>
<div id="final" class="modal hide">
    <h2>🏆 恭喜通关</h2>
    <button class="btn" id="finalRestartBtn">再来一局</button>
</div>

<script>
(function(){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const lvSpan = document.getElementById('lv');
    const timeSpan = document.getElementById('time');
    const eneSpan = document.getElementById('ene');
    const attackBtn = document.getElementById('attackBtn');

    // 高清渲染 + 平板横屏适配
    const dpr = window.devicePixelRatio || 1;
    const MAX_W = 1000;
    const MAX_H = 480;
    let CELL = 26;
    let player = {x:1,y:1};
    let map = [];
    let enemies = [];
    let enemyTimers = [];
    let gameTimer = null;
    let timeLeft = 0;
    let currentLevel = 0;
    let playing = false;

    // 挥剑系统
    const ATTACK_COOLDOWN = 500;
    const SLASH_RANGE = 1.2;
    let lastAttackTime = 0;
    let cooldownTimer = null;
    let isSlashing = false;
    let slashTimer;

    function createSlashEffect(x,y){
        const fx=document.createElement('div');
        fx.className='slash-effect';
        fx.style.left=x+'px'; fx.style.top=y+'px';
        fx.style.width=CELL*2+'px'; fx.style.height=CELL*2+'px';
        document.body.appendChild(fx);
        setTimeout(()=>fx.remove(),250);
    }
    function createHitEffect(x,y){
        const e=document.createElement('div');
        e.className='hit-effect';
        e.style.left=x+'px'; e.style.top=y+'px';
        document.body.appendChild(e);
        setTimeout(()=>e.remove(),400);
    }
    function slashAttack(){
        if(!playing)return;
        const now=Date.now();
        if(now-lastAttackTime<ATTACK_COOLDOWN)return;
        lastAttackTime=now;
        updateCooldownUI();
        isSlashing=true;
        clearTimeout(slashTimer);
        slashTimer=setTimeout(()=>isSlashing=false,180);
        const cx=player.x*CELL+CELL/2;
        const cy=player.y*CELL+CELL/2;
        createSlashEffect(cx-CELL,cy-CELL);
        for(let i=enemies.length-1;i>=0;i--){
            const e=enemies[i];
            const d=Math.hypot(e.x-player.x,e.y-player.y);
            if(d<=SLASH_RANGE){
                createHitEffect(e.x*CELL+CELL/2,e.y*CELL+CELL/2);
                clearInterval(enemyTimers[i]);
                enemyTimers.splice(i,1);
                enemies.splice(i,1);
            }
        }
        eneSpan.innerText=enemies.length;
    }
    function updateCooldownUI(){
        if(cooldownTimer)clearInterval(cooldownTimer);
        const s=Date.now();
        cooldownTimer=setInterval(()=>{
            const p=Date.now()-s;
            const r=Math.max(0,Math.ceil((ATTACK_COOLDOWN-p)/100));
            if(r<=0){attackBtn.dataset.cooldown='';clearInterval(cooldownTimer);}
            else attackBtn.dataset.cooldown=r;
        },50);
    }

    // 关卡
    const levels=[
        {rows:11,cols:15,time:60,enemyCount:0},
        {rows:11,cols:17,time:55,enemyCount:1},
        {rows:13,cols:19,time:50,enemyCount:2},
        {rows:13,cols:21,time:45,enemyCount:2},
        {rows:15,cols:23,time:40,enemyCount:3}
    ];

    // 敌人AI
    function getNextStepTowardPlayer(e,t){
        const r=map.length,c=map[0].length;
        if(e.x===t.x&&e.y===t.y)return null;
        const dir=[[0,-1],[1,0],[0,1],[-1,0]];
        const q=[{x:e.x,y:e.y,f:null}];
        const v=Array(r).fill().map(()=>Array(c).fill(false));
        v[e.y][e.x]=true;
        while(q.length){
            const n=q.shift();
            if(n.x===t.x&&n.y===t.y)return n.f;
            for(const[dx,dy]of dir){
                const nx=n.x+dx,ny=n.y+dy;
                if(nx<0||ny<0||nx>=c||ny>=r)continue;
                if(v[ny][nx]||map[ny][nx]===1)continue;
                v[ny][nx]=true;
                q.push({x:nx,y:ny,f:n.f||{dx,dy}});
            }
        }
        return null;
    }
    function moveEnemy(e){
        if(!playing)return;
        const s=getNextStepTowardPlayer(e,player);
        if(!s)return;
        const nx=e.x+s.dx,ny=e.y+s.dy;
        if(map[ny]&&map[ny][nx]!==1){
            e.x=nx;e.y=ny;draw();checkCollision();
        }
    }
    function getEnemySpeed(i,l){
        const b=[700,600,550];
        let sp=b[i]||650;
        const f=[1,0.9,0.85,0.8,0.75][l]||1;
        return Math.max(320,Math.floor(sp*f));
    }

    // 迷宫生成
    function generateMaze(rows,cols){
        let m=Array(rows).fill().map(()=>Array(cols).fill(1));
        let stack=[[1,1]]; m[1][1]=0;
        while(stack.length){
            let [x,y]=stack.at(-1);
            let d=[[0,-2],[2,0],[0,2],[-2,0]];
            let ok=[];
            for(let[dx,dy]of d){
                let nx=x+dx,ny=y+dy;
                if(nx>0&&nx<cols-1&&ny>0&&ny<rows-1&&m[ny][nx]===1)ok.push([dx,dy]);
            }
            if(ok.length){
                let[dx,dy]=ok[Math.random()*ok.length|0];
                m[y+dy/2|0][x+dx/2|0]=0;
                m[y+dy][x+dx]=0;
                stack.push([x+dx,y+dy]);
            }else stack.pop();
        }
        m[rows-2][cols-2]=0;
        for(let i=0;i<8;i++){
            let x=2+Math.random()*(cols-4)|0;
            let y=2+Math.random()*(rows-4)|0;
            if(m[y][x]===1)m[y][x]=0;
        }
        m[1][1]=2;
        m[rows-2][cols-2]=3;
        return m;
    }

    // 画布适配
    function resizeCanvas(rows,cols){
        const cw=Math.min(Math.floor(MAX_W/cols),30);
        const ch=Math.min(Math.floor(MAX_H/rows),30);
        CELL=Math.min(cw,ch);
        const w=cols*CELL;
        const h=rows*CELL;
        canvas.width=w*dpr;
        canvas.height=h*dpr;
        canvas.style.width=w+'px';
        canvas.style.height=h+'px';
        ctx.scale(dpr,dpr);
    }

    function loadLevel(idx){
        const cfg=levels[idx];
        map=generateMaze(cfg.rows,cfg.cols);
        resizeCanvas(cfg.rows,cfg.cols);
        timeLeft=cfg.time;
        enemies=[];
        lastAttackTime=0;
        isSlashing=false;
        attackBtn.dataset.cooldown='';

        for(let y=0;y<map.length;y++){
            for(let x=0;x<map[0].length;x++){
                if(map[y][x]===2){player.x=x;player.y=y;break;}
            }
        }
        for(let i=0;i<cfg.enemyCount;i++){
            let x,y,a=0;
            do{
                x=2+Math.random()*(map[0].length-4)|0;
                y=2+Math.random()*(map.length-4)|0;
                a++;
            }while((map[y][x]!==0||Math.hypot(x-player.x,y-player.y)<4)&&a<500)
            enemies.push({x,y,sp:getEnemySpeed(i,idx)});
        }
        draw();
    }

    function draw(){
        if(!ctx)return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let y=0;y<map.length;y++){
            for(let x=0;x<map[0].length;x++){
                ctx.fillStyle=map[y][x]===1?'#7b5cd6':map[y][x]===3?'#ffb347':'#fff7ed';
                ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
                ctx.strokeStyle='#eeddcc';
                ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);
            }
        }
        enemies.forEach(e=>{
            ctx.fillStyle='#e84118';
            ctx.beginPath();
            ctx.arc(e.x*CELL+CELL/2,e.y*CELL+CELL/2,CELL*0.28,0,Math.PI*2);
            ctx.fill();
        });
        if(isSlashing){
            ctx.fillStyle='rgba(255,60,60,0.22)';
            ctx.beginPath();
            ctx.arc(player.x*CELL+CELL/2,player.y*CELL+CELL/2,CELL*SLASH_RANGE,0,Math.PI*2);
            ctx.fill();
        }
        ctx.fillStyle='#3498db';
        ctx.beginPath();
        ctx.arc(player.x*CELL+CELL/2,player.y*CELL+CELL/2,CELL*0.32,0,Math.PI*2);
        ctx.fill();
    }

    function checkCollision(){
        if(!playing)return;
        if(map[player.y][player.x]===3){winGame();return;}
        const hit=enemies.some(e=>e.x===player.x&&e.y===player.y);
        if(hit)loseGame();
    }
    function movePlayer(dx,dy){
        if(!playing)return;
        const nx=player.x+dx,ny=player.y+dy;
        if(map[ny]&&map[ny][nx]!==1){
            player.x=nx;player.y=ny;draw();checkCollision();
        }
    }

    function startGame(){
        document.getElementById('start').classList.add('hide');
        currentLevel=0;loadLevel(0);playRound();
    }
    function playRound(){
        playing=true;
        lvSpan.innerText=currentLevel+1;
        timeSpan.innerText=timeLeft;
        eneSpan.innerText=enemies.length;
        if(gameTimer)clearInterval(gameTimer);
        enemyTimers.forEach(t=>clearInterval(t));enemyTimers=[];
        gameTimer=setInterval(()=>{
            if(!playing)return;
            timeLeft--;timeSpan.innerText=timeLeft;
            if(timeLeft<=0){timeLeft=0;loseGame();}
        },1000);
        enemies.forEach(e=>{
            const t=setInterval(()=>{if(playing)moveEnemy(e);},e.sp);
            enemyTimers.push(t);
        });
        (function a(){if(playing)draw();requestAnimationFrame(a);})();
        draw();
    }
    function winGame(){
        playing=false;clearInterval(gameTimer);
        enemyTimers.forEach(t=>clearInterval(t));
        if(cooldownTimer)clearInterval(cooldownTimer);
        if(currentLevel===4)document.getElementById('final').classList.remove('hide');
        else document.getElementById('win').classList.remove('hide');
    }
    function loseGame(){
        playing=false;clearInterval(gameTimer);
        enemyTimers.forEach(t=>clearInterval(t));
        if(cooldownTimer)clearInterval(cooldownTimer);
        document.getElementById('lose').classList.remove('hide');
    }
    function nextLevel(){
        document.getElementById('win').classList.add('hide');
        currentLevel++;loadLevel(currentLevel);playRound();
    }
    function restartCurrent(){
        document.getElementById('lose').classList.add('hide');
        loadLevel(currentLevel);playRound();
    }
    function finalRestart(){
        document.getElementById('final').classList.add('hide');
        startGame();
    }

    function bindControls(){
        document.querySelectorAll('.key[data-dx]').forEach(b=>{
            const dx=+b.dataset.dx,dy=+b.dataset.dy;
            const h=e=>{e.preventDefault();movePlayer(dx,dy);};
            b.onclick=h;b.addEventListener('touchstart',h,{passive:false});
        });
        const a=document.getElementById('attackBtn');
        const h=e=>{e.preventDefault();slashAttack();};
        a.onclick=h;a.addEventListener('touchstart',h,{passive:false});
        window.addEventListener('keydown',e=>{
            if(!playing)return;
            if(e.key==='ArrowUp')movePlayer(0,-1);
            else if(e.key==='ArrowDown')movePlayer(0,1);
            else if(e.key==='ArrowLeft')movePlayer(-1,0);
            else if(e.key==='ArrowRight')movePlayer(1,0);
            else if(e.key===' ')slashAttack();
        });
        document.getElementById('startBtn').onclick=startGame;
        document.getElementById('nextBtn').onclick=nextLevel;
        document.getElementById('restartBtn').onclick=restartCurrent;
        document.getElementById('finalRestartBtn').onclick=finalRestart;
    }

    function init(){
        loadLevel(0);bindControls();draw();playing=false;
    }
    init();
})();
</script>
</body>
</html>
