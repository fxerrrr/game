<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 荣耀平板5 (1920x1200) 专属全屏适配 -->
    <meta name="viewport" content="width=1200, height=1920, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>科技星球·陨石守卫战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background: #0a102b;
            background-image: radial-gradient(circle at 50% 50%, #152048 0%, #05091f 100%);
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrap {
            display: flex;
            width: 98vw;
            height: 95vh;
            gap: 3vw;
            align-items: flex-start;
            justify-content: center;
        }

        /* 左侧规则栏 加大加宽 */
        .rule-box {
            width: 30vw;
            max-width: 320px;
            background: rgba(255,255,255,0.1);
            padding: 30px 20px;
            border-radius: 16px;
            line-height: 2.3;
            font-size: 20px;
        }

        .rule-box h3 {
            color: #73d2ff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 26px;
        }

        /* 右侧游戏区 自适应居中 */
        .game-main {
            flex: 1;
            text-align: center;
            padding-top: 20px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 15px;
            color: #73d2ff;
            text-shadow: 0 0 10px #4096ff;
        }

        .info {
            font-size: 20px;
            margin: 15px 0;
            line-height: 1.8;
        }

        .task {
            color: #ffd700;
            font-weight: bold;
            margin: 10px 0;
            font-size: 21px;
        }

        #gameContainer {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 480px;
            margin: 20px auto;
        }

        .hole {
            width: 140px;
            height: 140px;
            background: #101a3d;
            border-radius: 18px;
            border: 2px solid #2a4386;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .item {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 100%;
            transition: top 0.2s ease;
            font-size: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item.show {
            top: 0;
        }

        .btn {
            padding: 12px 30px;
            font-size: 20px;
            background: #2374e1;
            color: #fff;
            border: none;
            border-radius: 10px;
            margin: 20px 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #195fc9;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <!-- 左侧大字加宽规则栏 -->
        <div class="rule-box">
            <h3>游戏规则</h3>
            <p>🛸 点击☄️陨石、👾病毒消除</p>
            <p>🤖 禁止点击友好机器人</p>
            <p>误点机器人直接闯关失败</p>
            <p>每关完成指定消除数量</p>
            <p>限时结束未完成则失败</p>
            <p>共5关，难度逐步提升</p>
        </div>

        <!-- 右侧游戏区域 -->
        <div class="game-main">
            <h1>科技星球·陨石守卫战</h1>
            <div class="info">
                关卡：<span id="level">1</span> &nbsp;&nbsp;
                剩余时间：<span id="time">30</span> 秒<br>
                <div class="task">通关任务：<span id="task">消除8个陨石/病毒</span></div>
                已完成进度：<span id="taskProgress">0</span>
            </div>

            <div id="gameContainer">
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
                <div class="hole"><div class="item"></div></div>
            </div>

            <div>
                <button class="btn" id="startBtn">开始游戏</button>
                <button class="btn" id="resetBtn">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        const ROBOT = '🤖';
        const METEOR = '☄️';
        const VIRUS = '👾';

        // 5关配置：时间缩短、难度适中偏难
        const levelConfig = [
            { taskNum: 8,  time: 30, interval: 1700, stay: 1300, maxNum: 2, robotRate: 0.12 },
            { taskNum: 10, time: 28, interval: 1500, stay: 1200, maxNum: 2, robotRate: 0.15 },
            { taskNum: 12, time: 26, interval: 1300, stay: 1100, maxNum: 3, robotRate: 0.20 },
            { taskNum: 14, time: 25, interval: 1100, stay: 1000, maxNum: 3, robotRate: 0.25 },
            { taskNum: 16, time: 23, interval: 900,  stay: 900,  maxNum: 3, robotRate: 0.30 }
        ];

        let currentLevel = 1;
        let timeLeft = 30;
        let currentTaskNum = 0;
        let timer = null;
        let gameTimer = null;
        let isPlaying = false;

        const holes = document.querySelectorAll('.item');
        const levelDom = document.getElementById('level');
        const timeDom = document.getElementById('time');
        const taskDom = document.getElementById('task');
        const taskProgressDom = document.getElementById('taskProgress');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function clearAllHoles() {
            holes.forEach(item => {
                item.classList.remove('show');
                item.innerText = '';
            });
        }

        function getRandomItem() {
            const cfg = levelConfig[currentLevel - 1];
            const r = Math.random();
            if(r < cfg.robotRate) return ROBOT;
            if(r < cfg.robotRate + 0.5) return METEOR;
            return VIRUS;
        }

        function getRandomEmptyHole() {
            let empty = [];
            holes.forEach((item, idx) => {
                if(!item.classList.contains('show')) empty.push(idx);
            });
            return empty.length ? empty[Math.floor(Math.random() * empty.length)] : -1;
        }

        function startRefresh() {
            const cfg = levelConfig[currentLevel - 1];
            if(gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                if(!isPlaying) return;
                let count = Math.floor(Math.random() * cfg.maxNum) + 1;
                for(let i = 0; i < count; i++) {
                    let idx = getRandomEmptyHole();
                    if(idx === -1) break;
                    let item = holes[idx];
                    item.innerText = getRandomItem();
                    item.classList.add('show');
                    setTimeout(() => {
                        item.classList.remove('show');
                    }, cfg.stay);
                }
            }, cfg.interval);
        }

        function startCountDown() {
            const cfg = levelConfig[currentLevel - 1];
            timeLeft = cfg.time;
            timeDom.innerText = timeLeft;
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                timeDom.innerText = timeLeft;
                if(timeLeft <= 0) {
                    endGame(`时间耗尽！未能完成${cfg.taskNum}个消除任务，闯关失败`);
                }
            }, 1000);
        }

        function initCurrentLevel() {
            const cfg = levelConfig[currentLevel - 1];
            currentTaskNum = 0;
            levelDom.innerText = currentLevel;
            taskDom.innerText = `消除${cfg.taskNum}个陨石/病毒`;
            taskProgressDom.innerText = currentTaskNum;
        }

        function endGame(msg) {
            isPlaying = false;
            clearInterval(timer);
            clearInterval(gameTimer);
            alert(msg);
            clearAllHoles();
            currentLevel = 1;
            initCurrentLevel();
            timeDom.innerText = levelConfig[0].time;
        }

        function nextLevel() {
            if(currentLevel >= 5) {
                endGame('🎉 恭喜你通关全部5关，成功守护科技星球！');
                return;
            }
            alert(`✅ 第${currentLevel}关通关成功！即将进入下一关`);
            currentLevel++;
            initCurrentLevel();
            clearAllHoles();
            startCountDown();
            startRefresh();
        }

        holes.forEach(item => {
            item.parentElement.addEventListener('click', () => {
                if(!isPlaying) return;
                if(!item.classList.contains('show')) return;
                let text = item.innerText;
                if(text === ROBOT) {
                    endGame('❌ 误点友好机器人，闯关失败！');
                } else {
                    currentTaskNum++;
                    taskProgressDom.innerText = currentTaskNum;
                    item.classList.remove('show');
                    const cfg = levelConfig[currentLevel - 1];
                    if(currentTaskNum >= cfg.taskNum) {
                        setTimeout(() => nextLevel(), 400);
                    }
                }
            });
        });

        startBtn.addEventListener('click', () => {
            if(isPlaying) return;
            isPlaying = true;
            currentLevel = 1;
            initCurrentLevel();
            clearAllHoles();
            startCountDown();
            startRefresh();
        });

        resetBtn.addEventListener('click', () => {
            endGame('🔄 已重置游戏，请重新开始挑战');
        });
    </script>
</body>
</html>
